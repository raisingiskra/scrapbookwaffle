<html>
<head>

  <link href='https://fonts.googleapis.com/css?family=Comic Relief' rel='stylesheet'>
<title>Scrapbook Waffle</title>
  <style>

<body>
  <div class="ufo">
    <img src="ufo.png" alt=":3">

  <div class="waffle">
    <img src="waffle.png" width="80">
  </div>
  <div class="title">
  <img src="glitter-text.gif" class="heading" alt="✨Welcome to Scrapbook Waffle!✨">
  <p>🪄 A silly awesome website with everything and nothing. Have fun exploring! 😸</p>
    <p>Sorry about the glitter spill, heh. I was crafting. And don't eat my waffle! :0</p>
